  type: Property
  source:
    path: RVUI.WPF
    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nThe list of available chart types for the end user to select from, please note this only affects the list of visualizations to pick from,\nif a given dashboard is using a visualization not listed here, that visualization will be used anyway.\nThe list is initially populated with all supported visualization types, so you can just remove those types you would like to get excluded.\n<pre><code>var toRemoveChartTypes = new List&lt;RVChartType>() { RVChartType.Sparkline };</code></pre>\n<pre><code>revealView.AvailableChartTypes = revealView.AvailableChartTypes.Except(toRemoveChartTypes).ToList();</code></pre>\nPlease note that <xref href=\"Reveal.Sdk.RVChartType.Pivot\" data-throw-if-not-resolved=\"false\"></xref> and <xref href=\"Reveal.Sdk.RVChartType.Image\" data-throw-if-not-resolved=\"false\"></xref> are used as the initial chart type \nfor a new visualization (depending on the source selected) even if those types are not included in this list.\n"
  syntax:
    content: public List<RVChartType> AvailableChartTypes { get; set; }
    parameters: []
    return:
      type: System.Collections.Generic.List{Reveal.Sdk.RVChartType}
      description: The list of available chart types for the end user to select from, an empty or null list means all types are displayed.
    content.vb: Public Property AvailableChartTypes As List(Of RVChartType)
  overload: Reveal.Sdk.RevealView.AvailableChartTypes*
  modifiers.csharp:
  - public
  - get
  - set
  modifiers.vb:
  - Public
