    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nThe interface representing in-memory data to be returned by <xref href=\"Reveal.Sdk.IRVInMemoryDataProvider\" data-throw-if-not-resolved=\"false\"></xref>, \nplease note data is returned as an IEnumerable, so there&apos;s no need to have all data loaded in memory.\nYou would probably use the default implementation for this interface: <xref href=\"Reveal.Sdk.RVInMemoryData%601\" data-throw-if-not-resolved=\"false\"></xref>\n"
  syntax:
    content: public interface IRVInMemoryData
    content.vb: Public Interface IRVInMemoryData
