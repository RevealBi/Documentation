- uid: Reveal.Sdk.IRVInMemoryData.GetData
  commentId: M:Reveal.Sdk.IRVInMemoryData.GetData
  id: GetData
  parent: Reveal.Sdk.IRVInMemoryData
  langs:
  - csharp
  - vb
  name: GetData()
  nameWithType: IRVInMemoryData.GetData()
  fullName: Reveal.Sdk.IRVInMemoryData.GetData()
  type: Method
  source:
    path: RVUI.WPF
    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nReturns an IEnumerable object with all rows in this dataset, please note data is \nreturned as an IEnumerable, so there&apos;s no need to have all data loaded in memory.\nFor each row returned from this IEnumerable, the order of values must match the order\nspecified in the collection returned by <xref href=\"Reveal.Sdk.IRVInMemoryData.GetSchema\" data-throw-if-not-resolved=\"false\"></xref>\n"
  syntax:
    content: IEnumerable<IEnumerable<object>> GetData()
    return:
      type: System.Collections.Generic.IEnumerable{System.Collections.Generic.IEnumerable{System.Object}}
    content.vb: Function GetData As IEnumerable(Of IEnumerable(Of Object))
  overload: Reveal.Sdk.IRVInMemoryData.GetData*
- uid: Reveal.Sdk.IRVInMemoryData.GetSchema
  commentId: M:Reveal.Sdk.IRVInMemoryData.GetSchema
  id: GetSchema
  parent: Reveal.Sdk.IRVInMemoryData
  langs:
  - csharp
  - vb
  name: GetSchema()
  nameWithType: IRVInMemoryData.GetSchema()
  fullName: Reveal.Sdk.IRVInMemoryData.GetSchema()
  type: Method
  source:
    path: RVUI.WPF
    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nReturns the schema for this dataset, basically the list of columns (name and data type),\ndata returned by <xref href=\"Reveal.Sdk.IRVInMemoryData.GetData\" data-throw-if-not-resolved=\"false\"></xref> must be returned in the same order than\nthe columns defined by this method.\nWhen using the default implementation for this interface (<xref href=\"Reveal.Sdk.RVInMemoryData%601\" data-throw-if-not-resolved=\"false\"></xref>),\nyou don&apos;t need to worry about this as it&apos;s resolved automatically by that implementation.\n"
  syntax:
    content: IEnumerable<RVSchemaColumn> GetSchema()
    return:
      type: System.Collections.Generic.IEnumerable{Reveal.Sdk.RVSchemaColumn}
    content.vb: Function GetSchema As IEnumerable(Of RVSchemaColumn)
  overload: Reveal.Sdk.IRVInMemoryData.GetSchema*
