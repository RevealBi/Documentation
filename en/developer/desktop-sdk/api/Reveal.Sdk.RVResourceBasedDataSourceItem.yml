  summary: "\nThe base abstract class representing a data source item getting data from a file (a resource).\nThis is the base class for CSV, Excel and JSON data source items.\nIt contains the reference to the resource item providing the file, for example a CSV file from a Web Resource URL\nwill be represented as a <xref href=\"Reveal.Sdk.RVCsvDataSourceItem\" data-throw-if-not-resolved=\"false\"></xref> referencing a <xref href=\"Reveal.Sdk.RVWebResourceDataSourceItem\" data-throw-if-not-resolved=\"false\"></xref>.\n"
  syntax:
    content: 'public abstract class RVResourceBasedDataSourceItem : RVDataSourceItem'
    content.vb: >-
      Public MustInherit Class RVResourceBasedDataSourceItem

          Inherits RVDataSourceItem
