- uid: Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
  commentId: M:Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
  id: ChangeVisualizationDataSourceItemAsync(Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
  parent: Reveal.Sdk.IRVDataSourceProvider
  langs:
  - csharp
  - vb
  name: ChangeVisualizationDataSourceItemAsync(RVVisualization, RVDataSourceItem)
  nameWithType: IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(RVVisualization, RVDataSourceItem)
  fullName: Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(Reveal.Sdk.RVVisualization, Reveal.Sdk.RVDataSourceItem)
  type: Method
  source:
    path: RVUI.WPF
    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nThis method can be used to replace the data source used by a given visualization, returning <code>null</code> indicates Reveal to use\nthe original data source stored in the dashboard.\n"
  syntax:
    content: Task<RVDataSourceItem> ChangeVisualizationDataSourceItemAsync(RVVisualization visualization, RVDataSourceItem dataSourceItem)
    parameters:
    - id: visualization
      type: Reveal.Sdk.RVVisualization
      description: The visualization where the data source is being referenced, you might use the Title attribute to decide the data source to use
    - id: dataSourceItem
      type: Reveal.Sdk.RVDataSourceItem
      description: Information about the data source being used, like the name of the table, database, etc.
    return:
      type: System.Threading.Tasks.Task{Reveal.Sdk.RVDataSourceItem}
      description: The new data source to use or <code>null</code> to use the original data source in the dashboard
    content.vb: Function ChangeVisualizationDataSourceItemAsync(visualization As RVVisualization, dataSourceItem As RVDataSourceItem) As Task(Of RVDataSourceItem)
  overload: Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync*
