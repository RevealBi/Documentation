      description: "\nRequired. This is usually the access token resulting from an OAuth authentication process. \n<p>The provided token is expected to be valid (not expired). If the caller&apos;s available token is expired or is about to expire,\nit is the caller&apos;s responsibility to perform a OAuth refresh request in order to get a fresh access token to use as a parameter\nfor this constructor.\n</p>\n"
