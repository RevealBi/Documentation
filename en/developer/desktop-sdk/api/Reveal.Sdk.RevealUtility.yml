- uid: Reveal.Sdk.RevealUtility.LoadDashboard(System.IO.Stream)
  commentId: M:Reveal.Sdk.RevealUtility.LoadDashboard(System.IO.Stream)
  id: LoadDashboard(System.IO.Stream)
  parent: Reveal.Sdk.RevealUtility
  langs:
  - csharp
  - vb
  name: LoadDashboard(Stream)
  nameWithType: RevealUtility.LoadDashboard(Stream)
  fullName: Reveal.Sdk.RevealUtility.LoadDashboard(System.IO.Stream)
  type: Method
  source:
    path: RVUI.WPF
    isExternal: true
  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nLoads a dashboard from the specified stream, asynchronous method that returns the loaded dashboard.\n"
  example:
  - >-
    <pre><code>             public partial class MainWindow : Window
                 {
                     public MainWindow()
                     {
                         InitializeComponent();
                         this.Loaded += MainWindow_Loaded;
                     }

                     private async void MainWindow_Loaded(object sender, RoutedEventArgs e)
                     {
                         var path = @&quot;..\..\Sales.rdash&quot;;

                         var revealView = new RevealView();
                         using (var fileStream = File.OpenRead(path))
                         {
                             var dashboard = await RevealUtility.LoadDashboard(fileStream);
                             var settings = new RevealSettings(dashboard);
                             revealView.Settings = settings;
                         }

                         Grid grid = this.Content as Grid;
                         grid.Children.Add(revealView);
                     }
                 }</code></pre>
  syntax:
    content: public static Task<RVDashboard> LoadDashboard(Stream data)
    parameters:
