      type: System.IO.Stream
      description: The stream with rdash file format
    return:
      type: System.Threading.Tasks.Task{Reveal.Sdk.RVDashboard}
      description: The dashboard object
    content.vb: Public Shared Function LoadDashboard(data As Stream) As Task(Of RVDashboard)
