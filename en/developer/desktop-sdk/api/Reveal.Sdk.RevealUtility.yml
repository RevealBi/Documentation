  assemblies:
  - RVUI.WPF
  namespace: Reveal.Sdk
  summary: "\nMethod used to get the possible values for a given filter. For a Country filter, this will return the list of all countries,\nnot only the selected ones. \nYou can use this method to create your own UI to select filter values.\n"
  syntax:
    content: public static Task<IEnumerable<RVFilterValue>> GetFilterValues(RVDashboard dashboard, RVDashboardFilter filter, CancellationToken cancellationToken = default(CancellationToken))
    parameters:
    - id: dashboard
      type: Reveal.Sdk.RVDashboard
      description: The dashboard object obtained with <xref href="Reveal.Sdk.RevealUtility.LoadDashboard(System.IO.Stream)" data-throw-if-not-resolved="false"></xref> or <xref href="Reveal.Sdk.RevealUtility.LoadDashboardSync(System.IO.Stream)" data-throw-if-not-resolved="false"></xref>
    - id: filter
      type: Reveal.Sdk.RVDashboardFilter
      description: "The filter to return the values for, a member of the collection <xref href=\"Reveal.Sdk.RVDashboard.Filters\" data-throw-if-not-resolved=\"false\"></xref>, \nmight be obtained also using <see cref=\"!:RVDashboard.GetFilterByTitle(string)\"></see> or <see cref=\"!:RVDashboard.GetFilterById(string)\"></see>"
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Optional parameter that can be used to cancel the async operation
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.IEnumerable{Reveal.Sdk.RVFilterValue}}
      description: The list of values for the given filter
    content.vb: Public Shared Function GetFilterValues(dashboard As RVDashboard, filter As RVDashboardFilter, cancellationToken As CancellationToken = Nothing) As Task(Of IEnumerable(Of RVFilterValue))
