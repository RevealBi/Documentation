  - uid: rpembedded.$.ig.RevealView#showMenu
    id: rpembedded.$.ig.RevealView#showMenu
    parent: rpembedded.$.ig.RevealView
    name: showMenu
    summary: "A flag that allows the dashboard filters panel to be hidden. This is useful if you want to limit the selected\rvalues for the filters to the initial selection specified in $.ig.RevealSettings.\rOnce the $.ig.RevealView object is created and rendered you can use $.ig.RevealView.setFilterSelectedValues to change\rthe selection for a given filter, so you can keep the selected values synced with your app."
    fullName: rpembedded.$.ig.RevealView.showMenu
    type: Member
    syntax:
      return:
        type:
          - boolean
      content: showMenu
    langs:
      - js
