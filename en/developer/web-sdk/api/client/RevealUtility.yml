  - uid: rpembedded.RevealUtility.loadDashboard
    id: rpembedded.RevealUtility.loadDashboard
    parent: rpembedded.RevealUtility
    name: 'loadDashboard(dashboardId, onSuccess, onError)'
    summary: >-
      Loads the dashboard with the given ID from the standard endpoint in the
      server.
    fullName: 'rpembedded.RevealUtility.loadDashboard(dashboardId, onSuccess, onError)'
    type: Function
    syntax:
      parameters:
        - id: dashboardId
          type:
            - string
          description: >-
            The ID of the dashboard to open, this ID will be received in the
            server: IRevealSdkContext.GetDashboardAsync
        - id: onSuccess
          type:
            - function
          description: >-
            A callback that will receive an instance of $.ig.RVDashboard class
            if the loading was successful.
        - id: onError
          type:
            - function
          description: A callback with the error message if the loading operation failed.
      content: 'function loadDashboard(dashboardId, onSuccess, onError)'
    langs:
      - js
  - uid: rpembedded.RevealUtility.loadDashboardFromContainer
    id: rpembedded.RevealUtility.loadDashboardFromContainer
    parent: rpembedded.RevealUtility
    name: 'loadDashboardFromContainer(blob, onSuccess, onError)'
    summary: Loads a dashboard from the Blob object with the contents of a .rdash file.
    fullName: >-
      rpembedded.RevealUtility.loadDashboardFromContainer(blob, onSuccess,
      onError)
    type: Function
    syntax:
      parameters:
        - id: blob
          type:
            - rpembedded.Blob
          description: >-
            The Blob object containing the binary contents of the dashboard in
            rdash file format.
        - id: onSuccess
          type:
            - function
          description: >-
            A callback that will receive an instance of $.ig.RVDashboard class
            if the loading was successful.
        - id: onError
          type:
            - function
          description: A callback with the error message if the loading operation failed.
      content: 'function loadDashboardFromContainer(blob, onSuccess, onError)'
    langs:
      - js
  - uid: rpembedded.RevealUtility.getFilterValues
    id: rpembedded.RevealUtility.getFilterValues
    parent: rpembedded.RevealUtility
    name: 'getFilterValues(dashboard, filter, callback, errorCallback)'
    summary: "Method used to get the possible values for a given filter.\rFor a Country filter, this will return the list of all countries, not only the selected ones.\rYou can use this method to create your own UI to select filter values."
    fullName: >-
      rpembedded.RevealUtility.getFilterValues(dashboard, filter, callback,
      errorCallback)
    type: Function
    syntax:
      parameters:
        - id: dashboard
          type:
            - rpembedded.$.ig.RVDashboard
          description: >-
            The dashboard object obtained with
            <xref:rpembedded.%24.ig.RevealUtility.loadDashboard>
        - id: filter
          type:
            - rpembedded.$.ig.RVDashboardFilter
          description: "The filter to return the values for, a member of the collection <xref:rpembedded.%24.ig.RVDashboard%23filters>,\rmight be obtained also using <xref:rpembedded.%24.ig.RVDashboard%23getFilterByTitle> or <xref:rpembedded.%24.ig.RVDashboard%23getFilterById>"
        - id: callback
          type:
            - function
          description: >-
            Callback function that will be invoked with a list of
            <xref:rpembedded.%24.ig.RVFilterValue> objects representing the list
            of available values for the given filter.
        - id: errorCallback
          type:
            - function
          description: Callback function with the errorMessage if the request failed.
      content: 'function getFilterValues(dashboard, filter, callback, errorCallback)'
    langs:
      - js
