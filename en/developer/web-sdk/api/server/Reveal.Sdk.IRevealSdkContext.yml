  namespace: Reveal.Sdk
  summary: "\nCallback method used to store changes to the specified dashboard.\nSee the developer guide for more information.\n"
  syntax:
    content: Task SaveDashboardAsync(string userId, string dashboardId, Stream dashboardStream)
    parameters:
    - id: userId
      type: System.String
      description: The ID of the user saving changes to the dashboard
    - id: dashboardId
      type: System.String
      description: The ID of the dashboard being saved
    - id: dashboardStream
      type: System.IO.Stream
      description: The stream with the contents of the dashboard in rdash format
    return:
      type: System.Threading.Tasks.Task
      description: The Task object that allows this method to be implemented as an async method
