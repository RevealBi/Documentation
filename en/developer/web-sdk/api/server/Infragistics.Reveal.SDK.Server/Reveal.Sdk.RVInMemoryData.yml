  namespace: Reveal.Sdk
  summary: "\nBase class that can be used as a helper class to implement <xref href=\"Reveal.Sdk.IRVInMemoryData\" data-throw-if-not-resolved=\"false\"></xref>, \nyou need to provide the data as an object implementing IEnumerable of IEnumerable objects\n(each object representing a cell in the data), and the list of fields in the schema.\nEach row returned by the &apos;Data&apos; enumerable must have the same number of elements\nindicated in the schema, the order must be respected and values ust \nbe returned in the same order specified in the schema returned.\n"
  syntax:
    content: 'public abstract class RVInMemoryData : Object, IRVInMemoryData, IRVInMemoryDataProvider'
    content.vb: >-
      Public MustInherit Class RVInMemoryData
          Inherits Object
          Implements IRVInMemoryData, IRVInMemoryDataProvider
