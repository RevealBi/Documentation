- uid: Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(System.String,System.String,Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
  commentId: M:Reveal.Sdk.IRVDataSourceProvider.ChangeVisualizationDataSourceItemAsync(System.String,System.String,Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
  id: ChangeVisualizationDataSourceItemAsync(System.String,System.String,Reveal.Sdk.RVVisualization,Reveal.Sdk.RVDataSourceItem)
